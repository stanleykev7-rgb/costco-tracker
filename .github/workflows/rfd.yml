name: RFD Deal Monitor

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:

permissions:
  contents: read   # read-only — this workflow NEVER writes to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run RFD monitor
        env:
          GH_PAT:            ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python rfd_monitor.py

      # NO git commit step — rfd_monitor.py never writes prices.json.
      # scrape.py is the single writer, preventing JSON corruption.
