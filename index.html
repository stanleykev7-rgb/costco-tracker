<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Price Watchlist · Canada</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ---- your existing styles remain unchanged ---- */
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <span class="header-title">Price Watchlist</span>
    <span class="header-sub">CANADA</span>

    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn" id="patBtn" onclick="togglePat()">🔑 SET PAT</button>
      <button class="btn" onclick="fetchData()">↻ REFRESH</button>
    </div>
  </div>
</div>

<div class="content">

<div id="products-list"></div>

<div id="add-form" style="display:none;"></div>

<button class="add-btn" id="add-btn" onclick="showAddForm()">+ ADD PRODUCT</button>

</div>

<script>

const GITHUB_USERNAME="stanleykev7-rgb"
const GITHUB_REPO="costco-tracker"

const RAW_URL="./prices.json"

const API_URL=`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/prices.json`

const SITES=["costco","amazon","walmart","bestbuy"]

const SITE_META={
costco:{label:"Costco"},
amazon:{label:"Amazon"},
walmart:{label:"Walmart"},
bestbuy:{label:"Best Buy"}
}

let appData=null
let currentSha=null
let selectedSites={}

function getPat(){
return localStorage.getItem("gh_pat")||""
}

function togglePat(){
const v=prompt("Enter GitHub PAT")
if(v){
localStorage.setItem("gh_pat",v)
}
}

async function fetchData(){

const res=await fetch(RAW_URL+"?t="+Date.now())

appData=await res.json()

render()

}

function render(){

const products=appData?.products||[]

document.getElementById("products-list").innerHTML=products.map(p=>`

<div class="product-card">

<div class="product-header">

<div>

<div class="product-name">${p.name}</div>

<div>${p.category||""}</div>

</div>

</div>

</div>

`).join("")

}

function showAddForm(){

selectedSites={costco:false,amazon:false,walmart:false,bestbuy:false}

renderForm()

document.getElementById("add-btn").style.display="none"

document.getElementById("add-form").style.display="block"

}

function renderForm(){

document.getElementById("add-form").innerHTML=`

<div class="form-card">

<div class="form-title">Add Product</div>

<div class="form-sub">Enter product name and paste the product URL for each store.</div>

<div class="form-grid">

<div>

<label>PRODUCT NAME</label>

<input id="pname" placeholder="Product name"/>

</div>

<div>

<label>CATEGORY</label>

<input id="pcat" placeholder="Category"/>

</div>

</div>

<label>Select stores</label>

<div class="sites-picker">

${SITES.map(site=>`

<div class="site-tile" onclick="toggleSite('${site}')">

${SITE_META[site].label}

</div>

`).join("")}

</div>

<div id="url-inputs"></div>

<div class="form-actions">

<button class="btn-primary" onclick="addProduct()">ADD PRODUCT</button>

<button class="btn-secondary" onclick="cancelAdd()">Cancel</button>

</div>

</div>

`

}

function toggleSite(site){

selectedSites[site]=!selectedSites[site]

renderUrlInputs()

}

function renderUrlInputs(){

const html=SITES.filter(s=>selectedSites[s]).map(site=>`

<div style="margin-bottom:10px">

<label>${SITE_META[site].label} URL</label>

<input id="url-${site}" placeholder="Paste ${SITE_META[site].label} product URL"/>

</div>

`).join("")

document.getElementById("url-inputs").innerHTML=html

}

function cancelAdd(){

document.getElementById("add-form").style.display="none"

document.getElementById("add-btn").style.display="block"

}

async function addProduct(){

const name=document.getElementById("pname").value.trim()

const cat=document.getElementById("pcat").value.trim()

if(!name)return

const site_data={}

const sites=[]

SITES.forEach(site=>{

if(selectedSites[site]){

const url=document.getElementById(`url-${site}`).value.trim()

sites.push(site)

site_data[site]={

url:url,

price:null,

was:null,

in_stock:null,

history:[]

}

}

})

const product={

id:Date.now().toString(),

name,

category:cat,

sites_to_track:sites,

site_data,

added_at:new Date().toISOString()

}

if(!appData){

appData={products:[]}

}

appData.products.push(product)

await saveData()

cancelAdd()

render()

}

async function saveData(){

const pat=getPat()

if(!pat){

alert("Set GitHub PAT first")

return

}

const res=await fetch(API_URL,{

headers:{Authorization:`Bearer ${pat}`}

})

const file=await res.json()

const content=btoa(JSON.stringify(appData,null,2))

await fetch(API_URL,{

method:"PUT",

headers:{Authorization:`Bearer ${pat}`,"Content-Type":"application/json"},

body:JSON.stringify({

message:"update products",

content,

sha:file.sha

})

})

}

fetchData()

</script>

</body>
</html>
